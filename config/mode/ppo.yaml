# PPO mode configuration (IPPO with shared policy - CTDE)
mode: "ppo"
load_model_start_path: "models/ppo"

# PPO training params
gamma: 0.99
lr: 0.001
train_batch_size: 4000
minibatch_size: 250
num_epochs: 4 # should set 1 if we use backward due to shuffle_batch_per_epoch: False
clip_param: 0.20
vf_loss_coeff: 0.5
entropy_coeff: 0.01
lambda_: 0.95
grad_clip: 0.5

# CTDE: All agents share one policy (centralized training, decentralized execution)
model_others: False
share_backbone: True

# Environment runners
num_env_runners: 0

# Logging / checkpointing
log_episode: 100
print_every: 1000
save_model_episode: 15000
visualize_every: 30000
n_episodes: 15000
