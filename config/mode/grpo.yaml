# GRPO mode configuration (Group Relative Policy Optimization)
mode: "grpo"
load_model_start_path: "models/grpo"

# Training params
gamma: 0.99
lr: 0.001
train_batch_size: 4000
minibatch_size: 250
num_epochs: 4
clip_param: 0.2
vf_loss_coeff: 0.0  
entropy_coeff: 0.01
lambda_: 0.95        # unused in GRPO (no GAE), kept for config compatibility
grad_clip: 0.5

# CTDE: All agents share one policy
model_others: False
share_backbone: False

# Environment runners
num_env_runners: 0

# Logging / checkpointing
log_episode: 100
print_every: 1000
save_model_episode: 15000
visualize_every: 30000
n_episodes: 15000
